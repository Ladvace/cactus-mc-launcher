name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Fast, always-on checks. The heavier test suites (unit / Rust / e2e) live in
# tests.yml and are run manually — see "Actions → Tests → Run workflow".
jobs:
  frontend:
    name: Frontend (check · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run build

  server:
    name: Server (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - working-directory: server
        run: bun install --frozen-lockfile
      - working-directory: server
        run: bunx tsc --noEmit
